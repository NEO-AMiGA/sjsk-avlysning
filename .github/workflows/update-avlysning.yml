name: Uppdatera Avlysning

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */2 * * *'

permissions:
  contents: write

concurrency:
  group: uppdatera-avlysning
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      API_URL: https://www.forsvarsmakten.se/api/searchapi/get-firing-ranges?lang=sv&county=S%C3%B6dermanlands%20l%C3%A4n&location=H%C3%A4rad&skip=0
      HARAD_PDF_DIR: /tmp/harad-pdfs
      HARAD_JSON_DIR: /tmp/harad-week-table

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Fetch documents and build fallback index.html
        shell: bash
        run: |
          set -euo pipefail

          json="$(curl -fsSL "$API_URL")"

          mapfile -t docs < <(
            printf '%s' "$json" | jq -r '
              .results[0].documents
              | map(
                  . + (
                    (.title | capture("-v(?<week>[0-9]+)-(?<year>[0-9]{4})")?)
                    // {"week":"999","year":"9999"}
                  )
                )
              | sort_by((.year | tonumber), (.week | tonumber))
              | .[]
              | @base64
            '
          )

          sv_time="$(TZ=Europe/Stockholm date '+%Y-%m-%d %H:%M')"

          links_html=""
          raw_html=""

          for row in "${docs[@]}"; do
            item() {
              printf '%s' "$row" | base64 -d | jq -r "$1"
            }

            title="$(item '.title')"
            url="$(item '.url')"
            week="$(item '.week')"

            if [[ "$week" == "999" ]]; then
              week_label="Okänd vecka"
            else
              week_label="Vecka ${week}"
            fi

            links_html+=$'<div class="doc">'
            links_html+=$'<div class="week">'"$week_label"$'</div>'
            links_html+=$'<div><a href="https://www.forsvarsmakten.se'"$url"$'" target="_blank" rel="noopener noreferrer">'"$title"$'</a></div>'
            links_html+=$'</div>'

            raw_html+=$'<li><a href="https://www.forsvarsmakten.se'"$url"$'" target="_blank" rel="noopener noreferrer">'"$title"$'</a></li>'
          done

          cat > index.html <<EOF
          <!doctype html>
          <html lang="sv">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta name="format-detection" content="telephone=no,date=no,address=no,email=no,url=no">
            <title>Härads skjutfält</title>
            <style>
              body{font-family:ProximaNova,"Helvetica Neue",Helvetica,Arial,sans-serif;padding:20px;line-height:1.45;color:#111;margin:0}
              .updated{font-size:14px;color:#666;margin:0 0 16px}
              .week{font-size:16px;font-weight:700;margin:0 0 1px}
              .doc{margin:0 0 12px}
              .doc a{color:#A43027;text-decoration:underline;font-size:15px;font-weight:400}
              .rawtitle{font-size:11px;font-weight:600;color:#777;margin:16px 0 4px}
              .rawblock{font-size:12px;color:#666}
              .rawblock ul{padding-left:20px;margin:4px 0 0}
              .rawblock li{margin:3px 0}
              .rawblock a{color:#A43027;text-decoration:underline;font-weight:400}
            </style>
          </head>
          <body>
            <p class="updated">Senast uppdaterad: ${sv_time}</p>
            ${links_html}
            <div class="rawtitle">Originaldata i debug-syfte för webmaster</div>
            <div class="rawblock"><ul>${raw_html}</ul></div>
            <script>
              window.addEventListener('load', function () {
                parent.postMessage(
                  {
                    type: 'HARAD_HEIGHT',
                    h: document.documentElement.scrollHeight
                  },
                  '*'
                );
              });
            </script>
          </body>
          </html>
          EOF

          mkdir -p "$HARAD_PDF_DIR"

          for row in "${docs[@]}"; do
            item() {
              printf '%s' "$row" | base64 -d | jq -r "$1"
            }

            title="$(item '.title')"
            url="$(item '.url')"
            file_name="$(printf '%s' "$title" | tr '[:upper:]' '[:lower:]' | sed 's/ /-/g')"

            curl -fsSL "https://www.forsvarsmakten.se${url}" -o "${HARAD_PDF_DIR}/${file_name}"
          done

      - name: Verify parser against sample PDFs
        env:
          HARAD_PDF_DIR: data/samples
        run: npm run verify:harad-week-table

      - name: Parse downloaded PDFs
        run: npm run parse:harad-week-table

      - name: Render parsed table into index.html
        run: npm run render:harad-week-table-html

      - name: Commit and push if changed
        shell: bash
        run: |
          set -euo pipefail
          branch_name="${GITHUB_REF_NAME}"

          if git diff --quiet -- index.html; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html
          git commit -m "Update Härad page"
          git pull --rebase origin "${branch_name}"
          git push origin "${branch_name}"
